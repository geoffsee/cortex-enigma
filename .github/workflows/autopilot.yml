name: Autopilot

# The action decides which events are worth acting on. The workflow's job
# is just to subscribe to the right events and hand them over.

on:
  issues:
    types: [opened, labeled, closed]
  pull_request:
    types: [closed]
  workflow_run:
    workflows: [CI]
    types: [completed]
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
    inputs:
      context:
        description: "Steering context for this run"
        required: false
        type: string
      dry_run:
        description: "Evaluate only; do not dispatch"
        required: false
        type: boolean
        default: false

permissions:
  actions: write
  checks: write
  contents: write
  issues: write
  pull-requests: write
  statuses: write

concurrency:
  group: autopilot
  cancel-in-progress: false

jobs:
  autopilot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: geoffsee/caretta-autopilot-action@main
        with:
          caretta-version: latest
          context: ${{ inputs.context || format('Autopilot triggered by {0}', github.event_name) }}
          dry-run: ${{ inputs.dry_run || 'false' }}
          github-token: ${{ github.token }}
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          DEV_BOT_APP_ID: ${{ secrets.DEV_BOT_APP_ID }}
          DEV_BOT_INSTALLATION_ID: ${{ secrets.DEV_BOT_INSTALLATION_ID }}
          DEV_BOT_PRIVATE_KEY_B64: ${{ secrets.DEV_BOT_PRIVATE_KEY_B64 }}
