name: CI

on:
  push:
    branches:
      - main
      - "agent/issue-*"
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Ref to test (branch name or SHA)"
        required: false
        type: string

permissions:
  contents: read
  checks: write

env:
  # Must match the version installed for local dev (see README).
  WASM_BINDGEN_VERSION: "0.2.122"

jobs:
  Test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JS deps
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Vitest (browser)
        run: bun run test
