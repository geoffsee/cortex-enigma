name: CI

# The Test check the autopilot gates agent PRs on.
#
# This project is a Bevy app compiled to WebAssembly served by a Bun
# bridge. CI installs the Rust toolchain + a pinned wasm-bindgen-cli,
# builds the web bundle, then runs the Vitest browser suite (Playwright
# provider) against the built artifacts.

on:
  push:
    branches:
      - main
      - "agent/issue-*"
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Ref to test (branch name or SHA)"
        required: false
        type: string

permissions:
  contents: read
  checks: write

env:
  # Must match the version installed for local dev (see README).
  WASM_BINDGEN_VERSION: "0.2.122"

jobs:
  Test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-bindgen-cli
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@${{ env.WASM_BINDGEN_VERSION }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JS deps
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Build WASM (web target)
        run: bun run build:web

      - name: Vitest (browser)
        run: bun run test
